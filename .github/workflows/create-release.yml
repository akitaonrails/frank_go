name: Create Release

# frank_go: builds the desktop distributables (Windows .exe, macOS .dmg,
# Linux AppImage) and attaches them to the GitHub Release for the tag.
# Linux is also shipped via the AUR (aur-release.yml) — this AppImage is a
# convenience for non-Arch users. Runs on the same v* tag as the AUR job.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned macOS version for reproducible release builds; both mac
          # arches cross-package on the arm64 runner.
          - os: macos-15
            dist: dist:macos
          - os: windows-latest
            dist: dist:win
          - os: ubuntu-latest
            dist: dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        if: runner.os == 'Linux'
        run: npm test
        env:
          CI: true
      # electron-builder signs/notarizes only when these secrets are set;
      # without them the macOS build is unsigned (notarize is off in the
      # build config). Scoped to macOS so CSC_LINK doesn't engage Windows
      # signing.
      - name: Build distributables (macOS)
        if: runner.os == 'macOS'
        run: npm run ${{ matrix.dist }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Build distributables
        if: runner.os != 'macOS'
        run: npm run ${{ matrix.dist }}
      # No auto-update client ships in frank_go (startup check disabled).
      # --glob: Windows runners use PowerShell, which doesn't expand globs.
      - name: Remove auto-update metadata
        run: npx rimraf --glob "./dist/*.yml" "./dist/*.yaml" "./dist/*.blockmap"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          path: dist/frank-go-*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: cd dist && sha256sum frank-go-* > SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/frank-go-*
      - name: Extract release notes
        run: node ./ci/releaseNotes.js > release-notes.md
      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag \
            --title "Frank GO $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
